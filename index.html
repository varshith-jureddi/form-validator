<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Validator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <form id="reg-form">
            <h1>Register</h1>
            <!-- USER NAME -->
            <div class="form-grp">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Entr Username"/>
                <small></small>
            </div>
            <!-- EMAIL -->
             <div class="form-grp">
                <label for="username">Email</label>
                <input type="text" id="email" placeholder="Entr Email"/>
                <small></small>
            </div>
            <!-- PASSWORD -->
             <div class="form-grp">
                <label for="username">Password</label>
                <input type="text" id="password" placeholder="Entr Password"/>
                <small></small>
            </div>
            <!-- CONFIRM -->
             <div class="form-grp">
                <label for="username">Confirm Password</label>
                <input type="text" id="confirm" placeholder="Confirm Password"/>
                <small></small>
            </div>
            <button type="submit" id="reg-btn">Register</button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
